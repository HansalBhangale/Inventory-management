# CI — aimed at the INVARIANTS, not "does the pipeline run".
# Every property we fought to establish must be un-regressable: a change that breaks tail
# coverage, lets a lag peek past the horizon, flips a frontier verdict, or lets the data contract
# accept bad input must FAIL the build. This file is transferable as-is to a real store — it tests
# the engine's properties, not M5's statistics.
name: invariants

on:
  push: {branches: [main, master]}
  pull_request: {branches: [main, master]}

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create env + install deps
        # uv venv (auto-downloads CPython 3.12) then install into it; --system has no target
        # when Python is uv-managed, which is what broke the previous run.
        run: |
          uv venv --python 3.12
          uv pip install -r requirements.txt
      - name: Lint
        run: uvx ruff check src tests
      - name: Invariant test suite
        # Full suite. Data-dependent tests self-skip when data/ is absent (CI has none), so what
        # runs is the pure-logic + synthetic invariants: leak-safety (lag>=horizon, embargo),
        # metric correctness, frontier/operating-policy verdicts, online-layer tail-calibration,
        # the magnitude-drift guard, newsvendor/promo paths, the data contract, shadow logic.
        run: uv run pytest -q

  # Model CD (retrain -> evaluate -> register -> MANUAL promote) is a separate, manually-dispatched
  # workflow, NOT wired to auto-fire: there is no real drift in a fixed dataset to trigger on, and
  # an autonomous loop against synthetic data builds false "it's running in prod" confidence.
  # Enable promotion automation only against a real drift signal. (Phase 6 components are unit-
  # validated; the loop is callable via src/continuous/retrain.py with a human trigger.)
