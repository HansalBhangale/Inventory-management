# policy.yaml — reorder decision layer (Phase 7)
# Locks down HOW we decide: when to order and how much.

policy_type: sS                  # continuous-review (s, S): order up to S when IP <= s

# Inventory position = on_hand + on_order - backorders
# Trigger: if IP <= reorder_point s -> place order

lead_time:
  source: po_grn_history         # estimate from PO->GRN (Phase 7.1)
  rolling_window_days: 180
  default_days: 3                # fallback when supplier history is thin
  default_std_days: 1.0

safety_stock:
  method: empirical_quantile     # Route B (preferred): use learned demand distribution
  # method: formula              # Route A: z * sqrt(L*sd^2 + d^2*sL^2)
  include_supply_variability: true

order_quantity:
  method: order_up_to            # S - IP for (s,S)
  round_to_moq: true
  round_to_pack_size: true
  use_eoq_for_steady_items: true

# Service-level target per ABC x XYZ segment (Phase 7.7). z = inverse normal CDF.
service_levels:
  A: {target: 0.98, z: 2.05}     # high value, stable
  B: {target: 0.95, z: 1.65}
  C: {target: 0.88, z: 1.18}     # low value
  default: {target: 0.95, z: 1.65}

# Perishables: newsvendor critical fractile Cu / (Cu + Co) (Phase 7.6)
perishables:
  use_newsvendor: true
  cap_order_to_shelf_life_demand: true

# Exception management (Phase 7.9): auto-approve routine, surface exceptions only.
exceptions:
  large_order_qty_threshold_units: 500
  low_confidence_coverage_gap: 0.05
  flag_perishables_near_expiry_days: 3
  flag_newly_drifting: true

# Inventory simulation (Phase 8.1) — replay forecasts -> reorder -> simulated inventory.
# IMPORTANT: M5 has NO real lead times / inventory / costs. These are ASSUMPTIONS. The sim's
# job here is to validate the reorder MACHINERY and the service-vs-inventory FRONTIER, not to
# produce quotable service-level numbers. Every result is stamped with its lead-time regime.
simulation:
  # Stochastic lead time per order ~ clipped Normal(mean, std). Value of the upper-tail
  # forecast grows with lead time, so we sweep regimes rather than assume one.
  lead_time_regimes:
    short: {mean: 1, std: 0.0}
    base:  {mean: 3, std: 1.0}
    long:  {mean: 7, std: 2.0}
  review_period_days: 1
  order_cycle_days: 1
  lost_sales: true             # unmet demand is lost (grocery), not backordered
  warmup_days: 7               # excluded from metrics (let inventory reach steady state)
  # Sweep the target service quantile to trace the service-vs-inventory frontier.
  # LGBM uses its empirical quantiles (Route B); baselines use z(q)*sigma_error (Route A).
  service_quantiles: [0.5, 0.9, 0.95]
  holding_cost_frac_per_year: 0.25   # holding cost = fraction of unit value per year
  moq_default: 1
  pack_size_default: 1
  sample_per_intermittency: 1500     # stratified sample size per class for the frontier grid
